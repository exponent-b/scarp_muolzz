<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Shopping | 쇼핑몰 상품 통합 검색</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --main-color: #198754;
        --bg-color: #f8f9fa;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg-color);
        font-family:
          "Pretendard",
          -apple-system,
          sans-serif;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .hero-card {
        max-width: 700px;
        width: 100%;
        padding: 40px;
        border-radius: 20px;
        background: white;
        transition: 0.3s;
      }
      .hero-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1) !important;
      }

      .form-control:focus {
        border-color: var(--main-color);
        box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
      }
      .btn-success {
        background-color: var(--main-color);
        border: none;
        padding: 15px;
        font-weight: 600;
      }
      .btn-success:hover {
        background-color: #157347;
      }

      .category-icon {
        font-size: 28px;
      }
    </style>
  </head>
  <body>

    <main>
      <div class="w-100">
        <!-- Hero Card -->
        <div class="hero-card shadow-lg mx-auto">
          <div class="text-center mb-4">
            <h1 class="display-5 mb-3 fw-bold">쇼핑몰 상품 비교 검색</h1>
            <p class="text-muted">
              원하는 상품과 쇼핑몰을 선택하면<br />
              해당 쇼핑몰의 상품 정보를 한 번에 확인할 수 있습니다.
            </p>
          </div>

        <form action="/search" method="GET">

            <label class="form-label fw-bold text-muted small">
                상품명 입력
            </label>
        
            <input 
                type="text" 
                name="key" 
                class="form-control form-control-lg"
                placeholder="예: 반팔, 신발, 선크림"
                required
            >
        
        
            <label class="form-label fw-bold mt-4">
                검색 사이트 선택
            </label>
        
        
            <div class="d-flex gap-4">
            
                <div class="form-check">
                    <input 
                        class="form-check-input"
                        type="checkbox"
                        name="site"
                        value="무신사"
                        checked
                    >
                    <label class="form-check-label">
                        무신사
                    </label>
                </div>
            
            
                <div class="form-check">
                    <input 
                        class="form-check-input"
                        type="checkbox"
                        name="site"
                        value="올리브영"
                        checked
                    >
                    <label class="form-check-label">
                        올리브영
                    </label>
                </div>
            
            
                <div class="form-check">
                    <input 
                        class="form-check-input"
                        type="checkbox"
                        name="site"
                        value="지그재그"
                        checked
                    >
                    <label class="form-check-label">
                        지그재그
                    </label>
                </div>
            
            </div>
        
        
            <button 
                type="submit" 
                class="btn btn-success btn-lg w-100 mt-4"
            >
                검색 시작
            </button>
        
        </form>

          <!-- Alert Info -->
          <div
            class="alert alert-success mt-4 border-0 rounded-3"
            role="alert"
            style="background-color: #e8f5e9; color: #198754"
          >
            <ul class="list-unstyled mb-0 small">
              <li>✔ 무신사 상품 데이터 수집</li>
              <li>✔ 올리브영 상품 데이터 수집</li>
              <li>✔ 지그재그 상품 데이터 수집</li>
              <li>✔ 상품 이미지 및 가격 정보 제공</li>
              <li>✔ CSV 다운로드 지원</li>
            </ul>
          </div>

          <!-- Tags -->
          <div class="mt-4 text-center">
            <p class="text-muted small mb-2">검색 가능한 상품 예시</p>
            <span class="badge bg-light text-dark border me-1">반팔</span>
            <span class="badge bg-light text-dark border me-1">후드티</span>
            <span class="badge bg-light text-dark border me-1">청바지</span>
            <span class="badge bg-light text-dark border me-1">운동화</span>
            <span class="badge bg-light text-dark border me-1">가방</span>
            <span class="badge bg-light text-dark border me-1">선크림</span>
            <span class="badge bg-light text-dark border me-1">핸드크림</span>
          </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-muted border-top bg-white">
      <small>&copy; 2026 Smart Shopping Compare</small>
    </footer>
  </body>
</html>
